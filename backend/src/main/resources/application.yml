server:
  # 默认 8081，避免与本机其它 8080 服务冲突；可用环境变量 SERVER_PORT 覆盖
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: rag-knowledge-backend
  config:
    import:
      - optional:file:./jwt-secret.properties
      - optional:file:./llm-local.properties
  datasource:
    url: jdbc:postgresql://localhost:5432/ragkb
    username: rag
    password: rag
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms
  cache:
    type: redis
    redis:
      time-to-live: 600000
      cache-null-values: false
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 30MB
  ai:
    # 默认走 Qwen / DashScope OpenAI 兼容接口；api-key 请放环境变量或 llm-local.properties
    openai:
      base-url: ${LLM_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      chat:
        options:
          model: ${LLM_CHAT_MODEL:qwen-plus}
    # 仅作为可选本机回退，不作为默认部署方案
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_CHAT_MODEL:llama3.2}

app:
  llm:
    provider: ${LLM_PROVIDER:qwen}
    chat-backend: ${LLM_CHAT_BACKEND:openai}
  jwt:
    secret: ${JWT_SECRET:local-dev-RAG-JWT-secret-min-32-chars-ok!!}
    expiration-ms: 86400000
  minio:
    endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
    access-key: ${MINIO_ACCESS_KEY:minio}
    secret-key: ${MINIO_SECRET_KEY:minio123456}
    bucket: ${MINIO_BUCKET:rag-docs}
  cors-allowed-origins:
    - http://localhost:5173
    - http://127.0.0.1:5173
    - http://localhost:5174
    - http://127.0.0.1:5174
    - http://localhost:5175
    - http://127.0.0.1:5175
  bootstrap:
    enabled: ${BOOTSTRAP_ENABLED:true}
    admin-username: ${ADMIN_USERNAME:admin}
    admin-password: ${ADMIN_PASSWORD:admin123456}
  chat:
    min-question-length: 4
    max-question-length: 1000
    min-interval-ms: 300
  multimodal:
    image-caption-enabled: ${IMAGE_CAPTION_ENABLED:false}
    video-caption-enabled: ${VIDEO_CAPTION_ENABLED:true}
    vision-provider: ${VISION_PROVIDER:auto}
    open-ai-vision-model: ${OPENAI_VISION_MODEL:qwen-vl-plus}
    ollama-vision-model: ${OLLAMA_VISION_MODEL:llava}
    caption-timeout-ms: 120000
    caption-fallback-on-error: true
    ffmpeg-command: ${FFMPEG_COMMAND:ffmpeg}
    video-max-frames: ${VIDEO_MAX_FRAMES:6}
    video-frame-width: ${VIDEO_FRAME_WIDTH:960}
  rag:
    # FTS-only：沿用该表名存储文本块与 metadata，不再依赖 embedding
    vector-table: vector_store
    hybrid:
      enabled: true
      fts-weight: 1.0
      recall-fts-k: 48
      fusion-pool: 24
      rrf-k: 60
    rerank:
      enabled: ${RAG_RERANK_ENABLED:false}
      model: bge-reranker-v2-m3
      top-n-for-llm: 3
      timeout-ms: 120000
    ingest:
      semantic-chunking: true
      semantic-max-chunk: 800
      semantic-overlap: 120
      semantic-min-chunk: 200

logging:
  level:
    com.rag.kb: INFO
